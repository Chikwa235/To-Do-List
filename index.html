<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do List</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: linear-gradient(135deg, #667eea, #764ba2);
      --container-bg: rgba(255, 255, 255, 0.12);
      --text-color: white;
      --input-bg: white;
      --button-bg: #00c6ff;
      --button-hover: #007bb5;
    }

    body.dark {
      --bg-color: linear-gradient(135deg, #1e1e2f, #3a3a5c);
      --container-bg: rgba(0, 0, 0, 0.4);
      --text-color: #f5f5f5;
      --input-bg: #333;
      --button-bg: #444;
      --button-hover: #666;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem;
      transition: 0.4s;
    }

    .todo-container {
      background: var(--container-bg);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 2rem;
      width: 100%;
      max-width: 700px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
    }

    h1 {
      text-align: center;
      margin-bottom: 1rem;
    }

    .toggle-mode {
      text-align: center;
      margin-bottom: 1rem;
    }

    .input-section {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.8rem;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      background: var(--input-bg);
      color: var(--text-color);
    }

    button {
      padding: 0.8rem 1rem;
      font-size: 1rem;
      background: var(--button-bg);
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: var(--button-hover);
    }

    ul {
      list-style-type: none;
      padding: 0;
    }

    li {
      background: var(--container-bg);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .task-info {
      flex: 1;
    }

    .task-text {
      font-size: 1.1rem;
      font-weight: 500;
    }

    .timestamp {
      font-size: 0.85rem;
      color: #ccc;
    }

    .actions button {
      background: none;
      border: none;
      margin-left: 0.5rem;
      cursor: pointer;
      font-size: 1.2rem;
    }

    .completed .task-text {
      text-decoration: line-through;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="todo-container">
    <h1>✅ To-Do List</h1>
    <div class="toggle-mode">
      <button onclick="toggleTheme()">🌓 Toggle Theme</button>
    </div>
    <div class="input-section">
      <input type="text" id="taskInput" placeholder="Enter a task..."/>
      <button onclick="addTask()">Add</button>
    </div>
    <ul id="taskList"></ul>
  </div>

  <script>
    const taskInput = document.getElementById("taskInput");
    const taskList = document.getElementById("taskList");

    window.onload = function () {
      const savedTasks = JSON.parse(localStorage.getItem("tasks")) || [];
      savedTasks.forEach(task => displayTask(task.text, task.timestamp, task.completed));
      if (localStorage.getItem("theme") === 'dark') {
        document.body.classList.add("dark");
      }
    };

    function toggleTheme() {
      document.body.classList.toggle("dark");
      localStorage.setItem("theme", document.body.classList.contains("dark") ? 'dark' : 'light');
    }

    function addTask() {
      const taskText = taskInput.value.trim();
      if (!taskText) return;

      const timestamp = new Date().toLocaleString();
      displayTask(taskText, timestamp);

      const savedTasks = JSON.parse(localStorage.getItem("tasks")) || [];
      savedTasks.push({ text: taskText, timestamp, completed: false });
      localStorage.setItem("tasks", JSON.stringify(savedTasks));

      taskInput.value = "";
    }

    function displayTask(text, timestamp, completed = false) {
      const li = document.createElement("li");
      if (completed) li.classList.add("completed");

      const infoDiv = document.createElement("div");
      infoDiv.classList.add("task-info");

      const taskSpan = document.createElement("div");
      taskSpan.classList.add("task-text");
      taskSpan.textContent = text;

      const timeSpan = document.createElement("div");
      timeSpan.classList.add("timestamp");
      timeSpan.textContent = `Added: ${timestamp}`;

      infoDiv.appendChild(taskSpan);
      infoDiv.appendChild(timeSpan);

      const actions = document.createElement("div");
      actions.classList.add("actions");

      const completeBtn = document.createElement("button");
      completeBtn.innerHTML = "✅";
      completeBtn.onclick = () => toggleComplete(text, timestamp, li);

      const editBtn = document.createElement("button");
      editBtn.innerHTML = "✏️";
      editBtn.onclick = () => editTask(text, timestamp);

      const deleteBtn = document.createElement("button");
      deleteBtn.innerHTML = "🗑️";
      deleteBtn.onclick = () => deleteTask(text, timestamp, li);

      actions.appendChild(completeBtn);
      actions.appendChild(editBtn);
      actions.appendChild(deleteBtn);

      li.appendChild(infoDiv);
      li.appendChild(actions);
      taskList.appendChild(li);
    }

    function toggleComplete(text, timestamp, element) {
      const tasks = JSON.parse(localStorage.getItem("tasks")) || [];
      const updatedTasks = tasks.map(task => {
        if (task.text === text && task.timestamp === timestamp) {
          task.completed = !task.completed;
        }
        return task;
      });
      localStorage.setItem("tasks", JSON.stringify(updatedTasks));
      element.classList.toggle("completed");
    }

    function editTask(text, timestamp) {
      const newTask = prompt("Edit your task:", text);
      if (!newTask) return;

      const tasks = JSON.parse(localStorage.getItem("tasks")) || [];
      const updatedTasks = tasks.map(task => {
        if (task.text === text && task.timestamp === timestamp) {
          task.text = newTask;
        }
        return task;
      });
      localStorage.setItem("tasks", JSON.stringify(updatedTasks));
      location.reload();
    }

    function deleteTask(text, timestamp, element) {
      taskList.removeChild(element);
      const tasks = JSON.parse(localStorage.getItem("tasks")) || [];
      const updatedTasks = tasks.filter(task => !(task.text === text && task.timestamp === timestamp));
      localStorage.setItem("tasks", JSON.stringify(updatedTasks));
    }
  </script>
</body>
</html>
